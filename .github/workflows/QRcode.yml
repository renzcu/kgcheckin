name: QRcode
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run qrcode
      - uses: actions/upload-artifact@v4
        with:
          name: qrcode
          path: qrcode.png  # 关键修正：将 `paths` 改回 `path`