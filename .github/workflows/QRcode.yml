name: QRcode
on:
  workflow_dispatch:
  # push:
  # schedule:
  #   - cron: 1 16 * * *
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run qrcode
      # 主要修改在这一行：将 @v3 改为 @v4，并将 path 改为 paths
      - uses: actions/upload-artifact@v4
        with:
          name: qrcode
          paths: qrcode.png